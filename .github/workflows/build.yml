name: Build ImmortalWrt Netis NX62 Ultimate V2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev libxml-parser-perl python3-setuptools \
          quilt rsync swig unzip zlib1g-dev bash-completion wget curl time
          sudo apt-get clean

      - name: Clone ImmortalWrt Source
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt openwrt

      - name: Update and Install Feeds
        run: |
          cd openwrt
          echo "src-git awg https://github.com/Slava-Shchipunov/awg-openwrt" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate Config
        run: |
          cd openwrt
          rm -f .config
          
          # Основные параметры железа (Filogic 820 / 512MB RAM / 128MB Flash)
          echo "CONFIG_TARGET_mediatek=y" > .config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_netcore_n60-pro=y" >> .config
          
          # Удаление конфликтов
          echo "# CONFIG_PACKAGE_dnsmasq is not set" >> .config
          echo "# CONFIG_PACKAGE_wpad-basic-wolfssl is not set" >> .config
          echo "# CONFIG_PACKAGE_wpad-mini is not set" >> .config

          cat <<EOT >> .config
          # --- Ускорение и Система ---
          CONFIG_PACKAGE_luci-app-turboacc=y
          CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_OFFLOADING=y
          CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_BBR_CCA=y
          CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_DNSFORWARDER=y
          CONFIG_PACKAGE_irqbalance=y
          CONFIG_PACKAGE_autocore-arm=y

          # --- База LuCI и Локализация ---
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-ru=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-statistics=y

          # --- Связь (PPPoE / L2TP / Modem 4G/5G) ---
          CONFIG_PACKAGE_luci-proto-ppp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y
          CONFIG_PACKAGE_ppp-mod-pppol2tp=y
          CONFIG_PACKAGE_modemmanager=y
          CONFIG_PACKAGE_luci-app-modemmanager=y
          CONFIG_PACKAGE_usb-modeswitch=y
          CONFIG_PACKAGE_kmod-usb-net-cdc-mbim=y
          CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
          CONFIG_PACKAGE_kmod-usb-net-rndis=y
          CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y

          # --- VPN и Удаленный доступ (L2TP Server + AmneziaWG) ---
          CONFIG_PACKAGE_luci-app-xl2tpd=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_kmod-amneziawg=y
          CONFIG_PACKAGE_amneziawg-tools=y
          CONFIG_PACKAGE_luci-app-amneziawg=y

          # --- Мониторинг клиентов и трафика ---
          CONFIG_PACKAGE_luci-app-nlbwmon=y
          CONFIG_PACKAGE_luci-app-access-control=y
          CONFIG_PACKAGE_avahi-dbus-daemon=y
          CONFIG_PACKAGE_luci-app-avahi=y

          # --- Работа с дисками и Time Machine (Samba4 + Fruit) ---
          CONFIG_PACKAGE_luci-app-samba4=y
          CONFIG_PACKAGE_samba4-server=y
          CONFIG_PACKAGE_samba4-libs=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-uas=y
          CONFIG_PACKAGE_kmod-usb-storage-extras=y
          CONFIG_PACKAGE_kmod-fs-ntfs3=y
          CONFIG_PACKAGE_kmod-fs-exfat=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-nls-utf8=y
          CONFIG_PACKAGE_kmod-nls-cp866=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_luci-app-disk-man=y
          CONFIG_PACKAGE_luci-app-hd-idle=y
          CONFIG_PACKAGE_wsdd2=y

          # --- Сетевые службы, DNS и SQM ---
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_dnsmasq_full_ipset=y
          CONFIG_PACKAGE_dnsmasq_full_nftset=y
          CONFIG_PACKAGE_luci-app-sqm=y
          CONFIG_PACKAGE_luci-app-adblock-fast=y
          CONFIG_PACKAGE_https-dns-proxy=y
          CONFIG_PACKAGE_luci-app-https-dns-proxy=y
          
          # --- DDNS ---
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_services=y
          CONFIG_PACKAGE_ddns-scripts_no-ip_com=y

          # --- Утилиты ---
          CONFIG_PACKAGE_mc=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_usbutils=y
          CONFIG_PACKAGE_badblocks=y

          # --- Wi-Fi 6 ---
          CONFIG_PACKAGE_wpad-openssl=y
          EOT
          
          make defconfig

      - name: Download DL
        run: |
          cd openwrt
          make download -j8

      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_NetisNX62_Ultimate_V2
          path: openwrt/bin/targets/mediatek/filogic/
