name: Build ImmortalWrt for Netis NX62

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev libxml-parser-perl python3-setuptools \
          quilt rsync swig unzip zlib1g-dev bash-completion wget curl
          sudo apt-get clean

      - name: Clone ImmortalWrt Source
        run: |
          # Клонируем основной репозиторий ImmortalWrt (ветка master)
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt openwrt

      - name: Update and Install Feeds
        run: |
          cd openwrt
          # Добавляем фид AmneziaWG (полная ссылка)
          echo "src-git awg https://github.com/Slava-Shchipunov/awg-openwrt" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate Config
        run: |
          cd openwrt
          cat <<EOT > .config
          # Платформа и Устройство
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_netcore_n60-pro=y

          # Интерфейс LuCI и локализация
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-ru=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-app-ttyd=y

          # VPN AmneziaWG
          CONFIG_PACKAGE_kmod-amneziawg=y
          CONFIG_PACKAGE_amneziawg-tools=y
          CONFIG_PACKAGE_luci-app-amneziawg=y

          # Сетевые сервисы
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_ddns-scripts_cloudflare=y
          CONFIG_PACKAGE_https-dns-proxy=y
          CONFIG_PACKAGE_luci-app-https-dns-proxy=y
          CONFIG_PACKAGE_xl2tpd=y
          CONFIG_PACKAGE_luci-app-xl2tpd=y

          # Утилиты
          CONFIG_PACKAGE_mc=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_htop=y

          # USB и Файловые системы
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-uas=y
          CONFIG_PACKAGE_kmod-fs-ntfs3=y
          CONFIG_PACKAGE_kmod-fs-exfat=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_luci-app-hd-idle=y

          # USB Модемы
          CONFIG_PACKAGE_kmod-usb-net-rndis=y
          CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y
          CONFIG_PACKAGE_usb-modeswitch=y

          # DNS и Wi-Fi (замена на full версии)
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_dnsmasq_full_dhcpv6=y
          CONFIG_PACKAGE_dnsmasq_full_ipset=y
          CONFIG_PACKAGE_wpad-openssl=y
          EOT
          
          # Отключаем конфликты
          sed -i 's/CONFIG_PACKAGE_dnsmasq=y/# CONFIG_PACKAGE_dnsmasq is not set/' .config
          sed -i 's/CONFIG_PACKAGE_wpad-basic-wolfssl=y/# CONFIG_PACKAGE_wpad-basic-wolfssl is not set/' .config
          
          make defconfig

      - name: Download DL
        run: |
          cd openwrt
          make download -j8

      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_NX62_Firmware
          path: openwrt/bin/targets/mediatek/filogic/*.bin
